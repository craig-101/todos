<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>todos</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="todos" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>todos</h1>
    <div class="topbar-right">
      <span id="status" class="status" hidden></span>
      <form method="post" action="/logout">
        <button type="submit" class="ghost">Sign out</button>
      </form>
    </div>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab active" data-view="active">Active <span class="count" data-count="active"></span></button>
      <button class="tab" data-view="trash">Trash <span class="count" data-count="trash"></span></button>
    </nav>

    <form id="add-form" class="add-form">
      <input id="new-text" type="text" placeholder="What needs doing?" maxlength="500" autocomplete="off" required />
      <select id="new-category" class="select" aria-label="Category">
        <option value="home">Home</option>
        <option value="work">Work</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <div id="toolbar" class="toolbar">
      <input id="search" type="search" class="search" placeholder="Search…" autocomplete="off" />
      <label class="toggle">
        <input id="hide-done" type="checkbox" />
        <span>Hide completed</span>
      </label>
    </div>

    <div id="filters" class="filters">
      <button class="pill active" data-cat="all">All <span class="count" data-count="cat-all"></span></button>
      <button class="pill" data-cat="home">Home <span class="count" data-count="cat-home"></span></button>
      <button class="pill" data-cat="work">Work <span class="count" data-count="cat-work"></span></button>
    </div>

    <div id="trash-toolbar" class="trash-toolbar" hidden>
      <span class="muted">Items in trash can be restored.</span>
      <button id="empty-trash" class="ghost danger-ghost" type="button">Empty trash</button>
    </div>

    <ul id="list" class="list"></ul>
    <p id="empty" class="muted empty" hidden>Nothing here yet.</p>
  </main>

  <div id="toast" class="toast" hidden>
    <span id="toast-msg"></span>
    <button id="toast-action" type="button">Undo</button>
  </div>

  <script src="/app.js"></script>
</body>
</html>
